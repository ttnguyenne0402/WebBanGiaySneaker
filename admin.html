<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản trị | SoleStyle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components/header.css">
  <link rel="stylesheet" href="assets/css/components/footer.css">
  <link rel="stylesheet" href="assets/css/components/breadcrumb.css">
  <link rel="stylesheet" href="assets/css/pages/admin.css">
</head>

<body data-page="admin">
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block sidebar">
        <div class="text-center mb-4">
          <h4>SoleStyle Admin</h4>
        </div>
        <a href="#" class="admin-nav-link active" data-target="users-section">
          <i class="bi bi-people me-2"></i>Quản lý tài khoản
        </a>
        <a href="#" class="admin-nav-link" data-target="products-section">
          <i class="bi bi-box-seam me-2"></i>Quản lý sản phẩm
        </a>
        <hr class="text-secondary" />
        <a href="#" id="adminLogoutBtn" class="text-danger">
          <i class="bi bi-box-arrow-right me-2"></i>Đăng xuất
        </a>
      </nav>

      <main class="col-md-10 ms-sm-auto col-lg-10 main-content">
        <section id="users-section" class="admin-section">
          <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
            <h2 class="mb-0">Quản lý tài khoản</h2>
            <button id="openUserModalBtn" class="btn btn-primary" type="button">
              <i class="bi bi-plus-lg me-1"></i>Thêm tài khoản
            </button>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Họ tên</th>
                      <th>Email</th>
                      <th>Số điện thoại</th>
                      <th>Mật khẩu</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody id="userTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <section id="products-section" class="admin-section d-none">
          <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
            <h2 class="mb-0">Quản lý sản phẩm</h2>
            <button id="openProductModalBtn" class="btn btn-primary" type="button">
              <i class="bi bi-plus-lg me-1"></i>Thêm sản phẩm
            </button>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Hình ảnh</th>
                      <th>Tên sản phẩm</th>
                      <th>Danh mục</th>
                      <th>Giá bán</th>
                      <th>Tồn kho</th>
                      <th>Thao tác</th>
                    </tr>
                  </thead>
                  <tbody id="productTableBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="userForm">
          <div class="modal-header">
            <h5 class="modal-title" id="userModalTitle">Thêm tài khoản</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editUserOldEmail" />
            <div class="mb-3">
              <label for="userName" class="form-label">Họ tên</label>
              <input type="text" class="form-control" id="userName" required />
            </div>
            <div class="mb-3">
              <label for="userEmail" class="form-label">Email</label>
              <input type="email" class="form-control" id="userEmail" required />
            </div>
            <div class="mb-3">
              <label for="userPhone" class="form-label">Số điện thoại</label>
              <input type="tel" class="form-control" id="userPhone" />
            </div>
            <div class="mb-3">
              <label for="userPassword" class="form-label">Mật khẩu</label>
              <input type="text" class="form-control" id="userPassword" minlength="5" required />
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-primary">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="productForm">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalTitle">Thêm sản phẩm</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editProductId" />
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="prodId" class="form-label">ID sản phẩm</label>
                <input type="text" class="form-control" id="prodId" required />
              </div>
              <div class="col-md-6 mb-3">
                <label for="prodName" class="form-label">Tên sản phẩm</label>
                <input type="text" class="form-control" id="prodName" required />
              </div>
              <div class="col-md-6 mb-3">
                <label for="prodBrand" class="form-label">Thương hiệu</label>
                <input type="text" class="form-control" id="prodBrand" placeholder="Nike, Adidas..." />
              </div>
              <div class="col-md-6 mb-3">
                <label for="prodCategory" class="form-label">Danh mục</label>
                <select class="form-control" id="prodCategory" required>
                  <option value="Giày">Giày</option>
                  <option value="Dép">Dép</option>
                  <option value="Nón">Nón</option>
                  <option value="Phụ kiện">Phụ kiện</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="prodType" class="form-label">Loại sản phẩm</label>
                <input type="text" class="form-control" id="prodType" placeholder="Giày chạy bộ, dép quai ngang..." />
              </div>
              <div class="col-md-6 mb-3">
                <label for="prodImage" class="form-label">Đường dẫn hình ảnh</label>
                <input type="text" class="form-control" id="prodImage" required />
              </div>
              <div class="col-md-4 mb-3">
                <label for="prodPrice" class="form-label">Giá bán (VNĐ)</label>
                <input type="number" class="form-control" id="prodPrice" min="1" required />
              </div>
              <div class="col-md-4 mb-3">
                <label for="prodOldPrice" class="form-label">Giá cũ (VNĐ)</label>
                <input type="number" class="form-control" id="prodOldPrice" min="0" />
              </div>
              <div class="col-md-4 mb-3">
                <label for="prodStock" class="form-label">Tồn kho</label>
                <input type="number" class="form-control" id="prodStock" min="0" required />
              </div>
              <div class="col-12 mb-3">
                <label for="prodDesc" class="form-label">Mô tả ngắn</label>
                <textarea class="form-control" id="prodDesc" rows="3"></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="submit" class="btn btn-primary">Lưu</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/data/products.js"></script>
  <script src="assets/js/pages/admin.js"></script>
</body>

</html>

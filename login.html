<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập | SoleStyle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components/header.css">
  <link rel="stylesheet" href="assets/css/components/footer.css">
  <link rel="stylesheet" href="assets/css/components/breadcrumb.css">
  <link rel="stylesheet" href="assets/css/pages/login.css">
</head>

<body data-page="login">

    <div class="auth-card">

        <!-- Header -->
        <div class="auth-header">
            <a href="index.html" class="back-home">
                <i class="bi bi-arrow-left"></i> Trang chủ
            </a>
            <a href="index.html" class="brand-icon">
                <i class="bi bi-shoe-print"></i> SoleStyle
            </a>
        </div>

        <!-- Title -->
        <div class="auth-title">
            <h1>Đăng nhập</h1>
            <p>Nhập email và mật khẩu để tiếp tục mua sắm.</p>
        </div>

        <!-- Notification -->
        <div id="thong-bao-dang-nhap" class="thong-bao-bieu-mau">
            <i class="bi bi-info-circle"></i>
            <span id="thong-bao-noi-dung"></span>
        </div>

        <!-- Form -->
        <form id="bieu-mau-dang-nhap" novalidate>
            <div class="form-group">
                <label for="email-dang-nhap" class="form-label">Email</label>
                <div class="input-wrapper">
                    <i class="bi bi-envelope"></i>
                    <input id="email-dang-nhap" class="form-control" type="email" placeholder="you@example.com"
                        required />
                </div>
                <div class="invalid-feedback" id="email-feedback">Vui lòng nhập email hợp lệ.</div>
            </div>

            <div class="form-group">
                <label for="mat-khau-dang-nhap" class="form-label">Mật khẩu</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input id="mat-khau-dang-nhap" class="form-control" type="password" placeholder="••••••••"
                        minlength="6" required />
                    <button type="button" class="toggle-password" id="togglePassword" aria-label="Hiển thị mật khẩu">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="invalid-feedback" id="password-feedback">Mật khẩu tối thiểu 6 ký tự.</div>
            </div>

            <button class="btn-login" type="submit" id="btnDangNhap">
                <span class="btn-text">Đăng nhập</span>
                <span class="spinner"></span>
            </button>
        </form>

        <!-- Divider + Social -->
        <div class="divider">HOẶC</div>
        <div class="social-login">
            <a href="#" class="social-btn"><i class="bi bi-google"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-btn"><i class="bi bi-apple"></i></a>
        </div>

        <!-- Footer -->
        <div class="auth-footer">
            <p>Chưa có tài khoản? <a href="create-account.html">Đăng ký</a></p>
        </div>
    </div>

    <!-- JavaScript riêng -->
    <script src="assets/js/pages/login.js"></script>
</body>

</html>

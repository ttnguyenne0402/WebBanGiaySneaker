<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giỏ hàng | SoleStyle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components/header.css">
    <link rel="stylesheet" href="assets/css/components/footer.css">
    <link rel="stylesheet" href="assets/css/components/breadcrumb.css">
    <link rel="stylesheet" href="assets/css/pages/cart.css">
</head>

<body data-page="cart" class="trang-phu">
    <header class="dau-trang-cua-hang">
        <div class="dai-loi-ich">
            <div class="container noi-dung-dai-loi-ich">
                <span><i class="bi bi-telephone-fill"></i> Hotline: 0707 717 271</span>
                <span><i class="bi bi-envelope-fill"></i> solestyle.cskh@gmail.com</span>
                <span><i class="bi bi-geo-alt-fill"></i> 171 Huỳnh Văn Bánh, Phú Nhuận, TP.HCM</span>
            </div>
        </div>

        <nav id="thanh-dieu-huong" class="thanh-chinh-dau-trang navbar">
            <div class="container noi-dung-header">
                <a class="logo-cua-hang d-flex align-items-center gap-2" href="index.html">
                    <span class="ky-hieu-logo">S</span>
                    <span>
                        SoleStyle
                        <small>Only Real</small>
                    </span>
                </a>

                <form id="bieu-mau-tim-kiem-dau-trang" class="thanh-tim-kiem" role="search">
                    <i class="bi bi-search"></i>
                    <input id="o-tim-kiem" type="search" placeholder="Tìm giày, dép, nón, phụ kiện..."
                        aria-label="Tìm sản phẩm">
                    <button type="submit" aria-label="Tìm kiếm"><i class="bi bi-arrow-right"></i></button>
                </form>

                <div class="hanh-dong-header">
                    <div id="hanh-dong-khach" class="nhom-tai-khoan">
                        <a class="btn btn-outline-dark nut-dang-nhap" href="login.html" aria-label="Đăng nhập">
                            <i class="bi bi-box-arrow-in-right"></i>
                            <span>Đăng nhập</span>
                        </a>
                    </div>

                    <div id="hanh-dong-nguoi-dung" class="dropdown d-none">
                        <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            <i class="bi bi-person-circle"></i>
                            <span id="ten-nguoi-dung">Tài khoản</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><span id="email-nguoi-dung" class="dropdown-item-text text-secondary"></span></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="profile.html">Hồ sơ</a></li>
                            <li><button id="nut-dang-xuat" class="dropdown-item" type="button">Đăng xuất</button></li>
                        </ul>
                    </div>

                    <button id="nut-mo-gio-hang" class="btn btn-dark position-relative nut-gio-hang" type="button"
                        aria-label="Xem giỏ hàng">
                        <i class="bi bi-bag"></i>
                        <span class="chu-gio-hang ms-1">Giỏ hàng</span>
                        <span id="so-luong-gio-hang"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-warning text-dark">0</span>
                    </button>
                </div>
            </div>
        </nav>

        <nav id="thanh-danh-muc" class="thanh-dieu-huong thanh-danh-muc navbar navbar-expand-lg sticky-top">
            <div class="container">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#khung-menu"
                    aria-controls="khung-menu" aria-expanded="false" aria-label="Mở menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="khung-menu">
                    <ul class="navbar-nav danh-sach-danh-muc mx-auto mb-2 mb-lg-0 align-items-lg-center">
                        <li class="nav-item"><a class="nav-link" href="products.html">Sản phẩm</a></li>
                        <li class="nav-item"><button class="nav-link nut-loc-danh-muc" type="button"
                                data-loc-danh-muc="Giày">Giày</button></li>
                        <li class="nav-item"><button class="nav-link nut-loc-danh-muc" type="button"
                                data-loc-danh-muc="Dép">Dép</button></li>
                        <li class="nav-item"><button class="nav-link nut-loc-danh-muc" type="button"
                                data-loc-danh-muc="Nón">Nón</button></li>
                        <li class="nav-item"><button class="nav-link nut-loc-danh-muc" type="button"
                                data-loc-danh-muc="Phụ kiện">Phụ kiện</button></li>
                        <li class="nav-item"><a class="nav-link" href="#chan-trang">Liên hệ</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <nav class="checkout-breadcrumb" aria-label="Đường dẫn thanh toán">
        <div class="container" style="max-width: 950px">
            <a href="./index.html">Trang chủ</a>
            <i class="bi bi-chevron-right"></i>

            <a href="./products.html">Sản phẩm</a>
            <i class="bi bi-chevron-right"></i>
            <span>Giỏ hàng</span>
        </div>
    </nav>
    <main class="cart-page py-5">
        <div class="container">

            <div class="row gx-4 gy-4">
                <section class="col-lg-8">
                    <div class="checkout-card p-4 rounded-4 bg-white shadow-sm">
                        <h2 class="fs-4 mb-3">Giỏ hàng của bạn</h2>
                        <div id="danh-sach-gio-hang" class="danh-sach-gio-hang"></div>
                    </div>
                </section>

                <aside class="col-lg-4">
                    <div class="checkout-summary-card p-4 rounded-4 bg-white shadow-sm">
                        <h2 class="fs-5 mb-3">Tóm tắt đơn hàng</h2>
                        <div class="summary-row mb-4">
                            <span>Tổng tiền</span>
                            <strong id="tong-tien-gio-hang">0đ</strong>
                        </div>
                        <button id="nut-thanh-toan" class="btn btn-dark w-100" type="button">Tiến hành thanh
                            toán</button>
                        <a href="products.html" class="btn btn-outline-dark w-100 mt-3">Tiếp tục mua sắm</a>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <script src="assets/js/data/products.js"></script>
    <script src="assets/js/core/common.js"></script>
    <script src="assets/js/pages/cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
